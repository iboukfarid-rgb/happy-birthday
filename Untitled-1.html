<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Birthday Kawtar! 🎂</title>
  <!-- cute fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background: #f0f8ff;  /* light blue */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(173, 216, 230, 0.4) 8px, transparent 8px),
        radial-gradient(circle at 80% 70%, rgba(135, 206, 235, 0.3) 12px, transparent 12px),
        radial-gradient(circle at 40% 80%, #b0e0e6 6px, transparent 6px),
        radial-gradient(circle at 90% 15%, #add8e6 10px, transparent 10px),
        radial-gradient(circle at 10% 60%, #87ceeb 7px, transparent 7px);
      background-size: 200px 200px;
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }
    /* main card */
    .birthday-card {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: min(60px, 10vw) min(60px, 10vw) min(80px, 12vw) min(80px, 12vw);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1),
                  0 0 0 8px #fff,
                  0 0 0 12px #ddd;
      padding: clamp(20px, 5vw, 40px) clamp(15px, 4vw, 30px);
      text-align: center;
      border: 2px solid white;
      transition: all 0.3s;
      position: relative;
    }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.2rem, 9vw, 4rem);
      color: #2c3e50;
      text-shadow: 4px 4px 0 #ecf0f1, 6px 6px 0 rgba(0, 0, 0, 0.1);
      margin-bottom: 10px;
      letter-spacing: 1px;
      word-break: break-word;
    }
    .sub-name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #34495e;
      margin-top: -5px;
      margin-bottom: 5px;
      text-shadow: 2px 2px 0 #ecf0f1;
    }
    .sender {
      font-family: 'Quicksand', sans-serif;
      color: #34495e;
      font-size: 1.2rem;
      margin-bottom: 15px;
      opacity: 0.8;
    }
    .emoji-row {
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .emoji-row span {
      display: inline-block;
      animation: float 3s infinite ease-in-out;
    }
    .emoji-row span:nth-child(2) { animation-delay: 0.2s; }
    .emoji-row span:nth-child(3) { animation-delay: 0.5s; }
    .emoji-row span:nth-child(4) { animation-delay: 0.7s; }
    .emoji-row span:nth-child(5) { animation-delay: 0.3s; }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    /* music control button */
    .music-btn {
      background: #b0c4de;
      border: 3px solid white;
      font-size: clamp(1.5rem, 4vw, 2rem);
      padding: 8px 20px;
      border-radius: 50px;
      display: inline-block;
      margin-bottom: 15px;
      cursor: pointer;
      box-shadow: 0 6px 0 #778899;
      transition: 0.1s;
      color: #2c3e50;
      white-space: nowrap;
    }
    .music-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #778899;
    }
    /* button arena */
    .button-arena {
      position: relative;
      height: clamp(180px, 30vw, 250px);
      width: 100%;
      margin: 20px 0 20px 0;
      background: rgba(220, 240, 255, 0.4);
      border-radius: 120px;
      box-shadow: inset 0 0 30px #b0c4de;
    }
    .btn {
      position: absolute;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      padding: clamp(12px, 2.5vw, 20px) clamp(20px, 5vw, 40px);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 0 #7f8c8d, 0 12px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.1s ease;
      width: auto;
      min-width: clamp(120px, 30vw, 200px);
      text-align: center;
      letter-spacing: 1px;
      border: 2px solid white;
      will-change: left, top, font-size, padding;
      user-select: none;
      touch-action: none;
    }
    .yes-btn {
      background: #f39c12;  /* gold */
      color: white;
      left: 8%;
      top: 30px;
      box-shadow: 0 8px 0 #e67e22, 0 12px 20px #f1c40f;
      z-index: 5;
    }
    .no-btn {
      background: #bdc3c7;  /* silver */
      color: #2c3e50;
      left: 62%;
      top: 30px;
      box-shadow: 0 6px 0 #95a5a6, 0 12px 20px #ccc;
      border: 2px dashed white;
      z-index: 10;
    }
    /* yes button when it becomes full icon */
    .yes-btn.full-icon {
      width: 100% !important;
      height: 100% !important;
      left: 0 !important;
      top: 0 !important;
      font-size: clamp(3rem, 10vw, 6rem) !important;
      padding: 0 !important;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1c40f;
      border-radius: 60px;
      box-shadow: 0 0 0 8px white, 0 20px 30px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    /* birthday message after YES is clicked – now with Pacifico font */
    .birthday-message {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      color: #2c3e50;
      background: #fff;
      padding: clamp(30px, 6vw, 50px) clamp(15px, 4vw, 30px);
      border-radius: 100px;
      margin: 20px 0;
      text-shadow: 2px 2px 0 #ecf0f1;
      box-shadow: 0 0 0 6px white, 0 15px 30px rgba(0,0,0,0.1);
      animation: pop 0.5s;
    }
    @keyframes pop {
      0% { transform: scale(0.2); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .hidden {
      display: none !important;
    }
    .sub-message {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      margin-top: 15px;
      color: #34495e;
      font-family: 'Quicksand', sans-serif;
    }
    .cute-emoji-line {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      margin-top: 15px;
      opacity: 0.8;
      font-family: 'Quicksand', sans-serif;
    }
  </style>
</head>
<body>
  <div class="birthday-card" id="birthdayCard">
    <!-- First emoji row – 🐻‍❄️💘🎀💓 + birthday cake -->
    <div class="emoji-row">
      <span>🐻‍❄️</span><span>💘</span><span>🎀</span><span>💓</span><span>🎂</span>
    </div>
    
    <!-- Happy Birthday Kawtar! -->
    <h1>Happy Birthday Kawtar! 🎂</h1>
    <!-- Playful message + sender (Farid) -->
    <div class="sub-name">💖 ntii wa3ra 💖</div>
    <div class="sender">— Farid 💌</div>

    <!-- music toggle button -->
    <div class="music-btn" id="musicToggle">🎵 play music</div>
    
    <!-- audio source – replace src with your own MP3 file name (e.g., kawtar.mp3) -->
    <audio id="birthdayMusic" loop preload="auto">
      <source src="kawtar.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <!-- Second emoji row – same set for consistency -->
    <div class="emoji-row">
      <span>🐻‍❄️</span><span>💘</span><span>🎀</span><span>💓</span><span>🧁</span>
    </div>

    <!-- Question in Darija: yak at7tafli? (Will you celebrate for me?) -->
    <h2 style="color:#34495e; margin-bottom:10px;">yak at7tafli?</h2>

    <!-- button arena -->
    <div class="button-arena" id="buttonArena">
      <button class="btn yes-btn" id="yesBtn">YES 🎂</button>
      <button class="btn no-btn" id="noBtn">no 🎈</button>
    </div>

    <!-- success message (appears when YES is clicked) -->
    <div id="responseMessage" class="birthday-message hidden"></div>
    <div class="cute-emoji-line">💕  Happy Birthday Kawtar!  💕</div>
  </div>

  <script>
    (function() {
      // elements
      const noButton = document.getElementById('noBtn');
      const yesButton = document.getElementById('yesBtn');
      const arena = document.getElementById('buttonArena');
      const messageDiv = document.getElementById('responseMessage');
      const musicAudio = document.getElementById('birthdayMusic');
      const musicToggle = document.getElementById('musicToggle');

      // music control
      let musicPlaying = false;
      musicAudio.volume = 0.5;
      musicToggle.addEventListener('click', (e) => {
        e.preventDefault();
        if (musicPlaying) {
          musicAudio.pause();
          musicToggle.innerHTML = '🎵 play music';
        } else {
          musicAudio.play().catch(() => {});
          musicToggle.innerHTML = '🎵 pause music';
        }
        musicPlaying = !musicPlaying;
      });

      // if YES is clicked, ensure music plays and show message
      yesButton.addEventListener('click', (e) => {
        e.preventDefault();
        if (!musicPlaying) {
          musicAudio.play().catch(() => {});
          musicPlaying = true;
          musicToggle.innerHTML = '🎵 pause music';
        }
        handleYes();
      });

      // grow step for YES button
      let growStep = 0;
      const MAX_STEP = 8;

      function growYesButton() {
        if (growStep >= MAX_STEP) return;
        growStep++;
        if (growStep < MAX_STEP) {
          // gradual growth
          let newFontSize = 1.4 + (growStep * 0.3); // rem
          let newPaddingV = 12 + (growStep * 3); // px
          let newPaddingH = 20 + (growStep * 6); // px
          yesButton.style.fontSize = newFontSize + 'rem';
          yesButton.style.padding = newPaddingV + 'px ' + newPaddingH + 'px';
          yesButton.style.background = `#f39c12`; // keep gold
        }
        if (growStep >= MAX_STEP) {
          // hide NO button and make YES full icon
          noButton.classList.add('hidden');
          yesButton.classList.add('full-icon');
          yesButton.innerHTML = '🎂 YES!! 🎂';
          yesButton.style.zIndex = 100;
        }
      }

      // move NO button away when attempted to click
      function moveNoButton() {
        const arenaW = arena.offsetWidth;
        const arenaH = arena.offsetHeight;
        const btnWidth = noButton.offsetWidth;
        const btnHeight = noButton.offsetHeight;
        let maxLeft = arenaW - btnWidth;
        let maxTop = arenaH - btnHeight;
        if (maxLeft < 0) maxLeft = 0;
        if (maxTop < 0) maxTop = 0;
        const randomLeft = Math.floor(Math.random() * (maxLeft + 1));
        const randomTop = Math.floor(Math.random() * (maxTop + 1));
        noButton.style.left = randomLeft + 'px';
        noButton.style.top = randomTop + 'px';
      }

      // prevent any click/touch on NO button and grow YES
      noButton.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
        moveNoButton();
        growYesButton();
      });
      noButton.addEventListener('touchstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        moveNoButton();
        growYesButton();
      }, { passive: false });
      noButton.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        moveNoButton();
        growYesButton();
        return false;
      });
      noButton.addEventListener('mouseenter', function(e) {
        e.preventDefault();
        moveNoButton();   // move on hover without growing
      });
      noButton.addEventListener('contextmenu', (e) => e.preventDefault());

      // YES button action
      function handleYes() {
        arena.classList.add('hidden');
        document.querySelector('.cute-emoji-line').classList.add('hidden');
        messageDiv.classList.remove('hidden');
        // Celebration message
        messageDiv.innerHTML = '🎉 l3zzz! 🎉<br>Happy Birthday, Kawtar! l3o9ba l100 3am 🎂';
        const extra = document.createElement('div');
        extra.className = 'sub-message';
        extra.innerHTML = '— Farid 💖';
        messageDiv.appendChild(extra);
      }

      // initial placement for NO button
      function setInitialNoPosition() {
        const arenaW = arena.offsetWidth;
        const arenaH = arena.offsetHeight;
        const btnWidth = noButton.offsetWidth;
        const btnHeight = noButton.offsetHeight;
        let targetLeft = arenaW * 0.6;
        let targetTop = 25;
        const maxLeft = arenaW - btnWidth;
        const maxTop = arenaH - btnHeight;
        if (targetLeft > maxLeft) targetLeft = maxLeft;
        if (targetLeft < 0) targetLeft = 0;
        if (targetTop > maxTop) targetTop = maxTop;
        if (targetTop < 0) targetTop = 0;
        noButton.style.left = targetLeft + 'px';
        noButton.style.top = targetTop + 'px';
      }

      window.addEventListener('load', function() {
        setTimeout(() => {
          setInitialNoPosition();
        }, 50);
      });
      window.addEventListener('resize', function() {
        if (!noButton.classList.contains('hidden')) {
          setInitialNoPosition();
        }
      });

      // resize observer for arena
      if (window.ResizeObserver) {
        const resizeObserver = new ResizeObserver(() => {
          if (!noButton.classList.contains('hidden')) {
            setInitialNoPosition();
          }
        });
        resizeObserver.observe(arena);
      }
    })();
  </script>
</body>
</html>
